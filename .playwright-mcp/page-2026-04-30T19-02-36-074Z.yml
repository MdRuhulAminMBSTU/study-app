                        - generic [ref=f4e303]:
                          - paragraph [ref=f4e304]: "To modify your deployment to comply with Azure policies, you can follow these steps:"
                          - list [ref=f4e305]:
                            - listitem [ref=f4e306]:
                              - paragraph [ref=f4e307]:
                                - strong [ref=f4e308]: Identify the Policy
                                - text: ": Use the Azure portal or Azure CLI to find the policy assignment and definition IDs that are causing the deployment issue. This will help you understand the specific rules and allowed regions."
                            - listitem [ref=f4e309]:
                              - paragraph [ref=f4e310]:
                                - strong [ref=f4e311]: Modify Deployment
                                - text: ": Adjust your deployment to use one of the allowed regions specified by the policy. This may involve changing the region in your deployment template or script."
                            - listitem [ref=f4e312]:
                              - paragraph [ref=f4e313]:
                                - strong [ref=f4e314]: Request Policy Change
                                - text: ": If the required region is not allowed, you can request a policy change from your organization's policy manager or Azure support to include the desired region."
                            - listitem [ref=f4e315]:
                              - paragraph [ref=f4e316]:
                                - strong [ref=f4e317]: Use Safe Deployment Practices
                                - text: ": Implement safe deployment practices by using enforcement modes and remediation tasks. This involves:"
                              - list [ref=f4e318]:
                                - listitem [ref=f4e319]: Assigning the policy at the highest-level scope and using resource selectors to narrow applicability.
                                - listitem [ref=f4e320]: Configuring the enforcement mode to "DoNotEnforce" initially and validating compliance results.
                                - listitem [ref=f4e321]: Expanding resource selectors to include more regions and validating compliance at each stage.
                          - paragraph [ref=f4e322]: "For detailed guidance, you can refer to the following resources:"
